<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Le cahier de vacances interactif de Maya et Aaron" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#FF6B9D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Maya & Aaron" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
  <link rel="stylesheet" href="./assets/css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <title>Les Vacances de Maya et Aaron 🦋🚀</title>
</head>
<body>
  <div id="loading-screen" role="status" aria-live="polite">
    <div class="loader-emojis">🦋🚀</div>
    <div class="loader-title">Les Vacances de<br>Maya et Aaron…</div>
  </div>

  <main id="app" role="main">
    <div id="screen-home" class="screen active" aria-label="Accueil"></div>
    <div id="screen-child" class="screen" aria-label="Matières"></div>
    <div id="screen-rubriques" class="screen" aria-label="Étapes"></div>
    <div id="screen-content" class="screen" aria-label="Contenu"></div>
    <div id="screen-progress" class="screen" aria-label="Progression"></div>
  </main>

  <nav id="main-nav" role="navigation" aria-label="Navigation principale">
    <button class="nav-btn active" data-screen="home"><span class="nav-icon">🏠</span><span class="nav-label">Accueil</span></button>
    <button class="nav-btn" data-screen="maya"><span class="nav-icon">🦋</span><span class="nav-label">Maya</span></button>
    <button class="nav-btn" data-screen="aaron"><span class="nav-icon">🚀</span><span class="nav-label">Aaron</span></button>
    <button class="nav-btn" data-screen="progress"><span class="nav-icon">🏆</span><span class="nav-label">Progrès</span></button>
  </nav>

  <script src="./assets/js/progress.js"></script>
  <script src="./assets/js/app.js"></script>
</body>
</html>
